<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours | Admin E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1>Tous les Cours</h1><p>Vue d'ensemble des cours de la plateforme</p></div>
        <div class="content-body fade-in">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-book"></i> Liste des cours</h3></div>
                <div class="card-body">
                    <div class="table-container"><table>
                        <thead><tr><th>ID</th><th>Titre</th><th>Catégorie</th><th>Niveau</th><th>Formateur</th><th>Statut</th><th>Date</th></tr></thead>
                        <tbody>
                        <tr th:each="cours : ${coursList}">
                            <td th:text="${cours.id}">#</td>
                            <td th:text="${cours.titre}">Titre</td>
                            <td th:text="${cours.categorie}">Cat</td>
                            <td><span class="badge badge-cyan" th:text="${cours.niveau}">Niveau</span></td>
                            <td th:text="${cours.formateur.name}">Formateur</td>
                            <td><span th:class="${cours.actif ? 'badge badge-success' : 'badge badge-danger'}" th:text="${cours.actif ? 'Actif' : 'Inactif'}">Statut</span></td>
                            <td th:text="${#temporals.format(cours.dateCreation, 'dd/MM/yyyy')}">Date</td>
                        </tr>
                        </tbody>
                    </table></div>
                    <div th:if="${#lists.isEmpty(coursList)}" class="empty-state"><div class="icon"><i class="fas fa-book"></i></div><h3>Aucun cours</h3></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
