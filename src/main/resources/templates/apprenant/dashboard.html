<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Apprenant | E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1>Bonjour, <span th:text="${apprenant.name}">Apprenant</span> 👋</h1><p>Votre progression d'apprentissage</p></div>
        <div class="content-body fade-in">
            <div th:if="${message}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${message}"></span></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-book-open"></i></div><div class="stat-value" th:text="${totalCours}">0</div><div class="stat-label">Cours inscrits</div></div>
                <div class="stat-card"><div class="stat-icon orange"><i class="fas fa-spinner"></i></div><div class="stat-value" th:text="${coursEnCours}">0</div><div class="stat-label">En cours</div></div>
                <div class="stat-card"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div class="stat-value" th:text="${coursTermines}">0</div><div class="stat-label">Terminés</div></div>
                <div class="stat-card"><div class="stat-icon cyan"><i class="fas fa-chart-line"></i></div><div class="stat-value" th:text="${progressionMoyenne} + '%'">0%</div><div class="stat-label">Progression moyenne</div></div>
            </div>

            <div class="card">
                <div class="card-header"><h3><i class="fas fa-graduation-cap"></i> Mes cours récents</h3><a th:href="@{/apprenant/catalogue}" class="btn btn-sm btn-primary"><i class="fas fa-search"></i> Explorer</a></div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(recentCours)}" class="empty-state"><div class="icon"><i class="fas fa-book"></i></div><h3>Aucun cours</h3><p>Explorez le catalogue pour vous inscrire</p><a th:href="@{/apprenant/catalogue}" class="btn btn-primary" style="margin-top:16px;">Voir le catalogue</a></div>
                    <div class="courses-grid" th:unless="${#lists.isEmpty(recentCours)}">
                        <div class="card course-card" th:each="data : ${recentCours}">
                            <div class="course-card-img">
                                <img th:if="${data.cours.imageUrl}" th:src="${data.cours.imageUrl}" alt="Cours">
                                <i th:unless="${data.cours.imageUrl}" class="fas fa-book"></i>
                            </div>
                            <div class="course-card-body">
                                <div class="course-card-title" th:text="${data.cours.titre}">Titre</div>
                                <div style="margin:12px 0;">
                                    <div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:12px;"><span>Progression</span><span th:text="${#numbers.formatDecimal(data.progression, 0, 0)} + '%'">0%</span></div>
                                    <div class="progress-bar-container"><div class="progress-bar-fill" th:style="'width:' + ${data.progression} + '%'"></div></div>
                                </div>
                                <a th:href="@{/apprenant/cours/{id}(id=${data.cours.id})}" class="btn btn-sm btn-primary" style="width:100%; justify-content:center;">Continuer</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
