<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Résultats | E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1>Mes Résultats</h1><p>Historique de vos quiz</p></div>
        <div class="content-body fade-in">
            <div th:if="${#lists.isEmpty(resultats)}" class="empty-state"><div class="icon"><i class="fas fa-trophy"></i></div><h3>Aucun résultat</h3><p>Vous n'avez pas encore passé de quiz</p></div>
            <div class="card" th:unless="${#lists.isEmpty(resultats)}">
                <div class="card-body">
                    <div class="table-container"><table>
                        <thead><tr><th>Quiz</th><th>Score</th><th>Bonnes réponses</th><th>Résultat</th></tr></thead>
                        <tbody>
                        <tr th:each="r : ${resultats}">
                            <td><strong th:text="${r.quiz.titre}">Quiz</strong></td>
                            <td><span style="font-weight:700; font-size:18px;" th:style="${r.score >= 60 ? 'color:var(--success);' : 'color:var(--danger);'}" th:text="${r.score} + '%'">0%</span></td>
                            <td th:text="${r.bonnesReponses} + ' / ' + ${r.totalQuestions}">0/0</td>
                            <td><span class="badge" th:classappend="${r.reussi ? 'badge-success' : 'badge-danger'}" th:text="${r.reussi ? '✓ Réussi' : '✗ Échoué'}">R</span></td>
                        </tr>
                        </tbody>
                    </table></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
