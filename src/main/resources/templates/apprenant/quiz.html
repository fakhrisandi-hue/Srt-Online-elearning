<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${quiz.titre} + ' | E-Learning'">Quiz</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1 th:text="${quiz.titre}">Quiz</h1><p><span class="badge badge-cyan" th:text="${quiz.dureeMin} + ' minutes'">15min</span></p></div>
        <div class="content-body fade-in">
            <div th:if="${message}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${message}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>

            <!-- Results if already answered -->
            <div th:if="${dejaRepondu}" class="card" style="margin-bottom:24px;">
                <div class="card-body" style="text-align:center; padding:40px;">
                    <div style="font-size:64px; font-weight:800; margin-bottom:8px;" th:classappend="${score >= 60 ? '' : ''}" th:style="${score >= 60 ? 'color:var(--success);' : 'color:var(--danger);'}" th:text="${score} + '%'">0%</div>
                    <div style="font-size:18px; font-weight:600; margin-bottom:4px;" th:text="${score >= 60 ? '🎉 Félicitations !' : '😔 Pas encore réussi'}">Résultat</div>
                    <div style="color:var(--text-muted);" th:text="${bonnesReponses} + ' / ' + ${totalReponses} + ' bonnes réponses'">Score</div>
                    <div style="margin-top:16px;"><span class="badge" th:classappend="${score >= 60 ? 'badge-success' : 'badge-danger'}" th:text="${score >= 60 ? 'Réussi' : 'Échoué'}">Status</span></div>
                </div>
            </div>

            <!-- Quiz Form -->
            <div th:unless="${dejaRepondu}">
                <form th:action="@{/apprenant/quiz/{id}/soumettre(id=${quiz.id})}" method="post">
                    <div th:each="data, iter : ${questionsData}" class="question-card">
                        <div class="question-title"><span th:text="'Question ' + ${iter.count} + ' : '">Q</span><span th:text="${data.question.enonce}">Enoncé</span></div>
                        <div class="choix-list">
                            <label th:each="choix : ${data.choix}" class="choix-item">
                                <input type="radio" th:name="'question_' + ${data.question.id}" th:value="${choix.id}">
                                <span th:text="${choix.texte}">Choix</span>
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" onclick="return confirm('Êtes-vous sûr de vouloir soumettre vos réponses ?')"><i class="fas fa-paper-plane"></i> Soumettre mes réponses</button>
                </form>
            </div>
            <div th:if="${#lists.isEmpty(questionsData) && !dejaRepondu}" class="empty-state"><div class="icon"><i class="fas fa-question-circle"></i></div><h3>Aucune question dans ce quiz</h3></div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
