<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Cours | E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1>Mes Cours</h1><p>Gérez vos cours et leur contenu</p></div>
        <div class="content-body fade-in">
            <div th:if="${message}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${message}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>
            <div style="margin-bottom:24px;"><a th:href="@{/formateur/cours/new}" class="btn btn-primary"><i class="fas fa-plus"></i> Nouveau cours</a></div>
            <div class="card">
                <div class="card-body">
                    <div class="table-container"><table>
                        <thead><tr><th>Titre</th><th>Catégorie</th><th>Niveau</th><th>Modules</th><th>Inscrits</th><th>Actions</th></tr></thead>
                        <tbody>
                        <tr th:each="data : ${coursData}">
                            <td th:text="${data.cours.titre}">Titre</td>
                            <td th:text="${data.cours.categorie}">Cat</td>
                            <td><span class="badge badge-cyan" th:text="${data.cours.niveau}">Niveau</span></td>
                            <td th:text="${data.nbModules}">0</td>
                            <td th:text="${data.nbInscrits}">0</td>
                            <td style="display:flex; gap:6px;">
                                <a th:href="@{/formateur/cours/{id}/edit(id=${data.cours.id})}" class="btn btn-sm btn-outline"><i class="fas fa-edit"></i></a>
                                <a th:href="@{/formateur/cours/{id}/modules(id=${data.cours.id})}" class="btn btn-sm btn-primary"><i class="fas fa-cubes"></i></a>
                                <a th:href="@{/formateur/cours/{id}/apprenants(id=${data.cours.id})}" class="btn btn-sm btn-outline"><i class="fas fa-users"></i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table></div>
                    <div th:if="${#lists.isEmpty(coursData)}" class="empty-state"><div class="icon"><i class="fas fa-book"></i></div><h3>Aucun cours</h3><a th:href="@{/formateur/cours/new}" class="btn btn-primary" style="margin-top:16px;">Créer un cours</a></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
