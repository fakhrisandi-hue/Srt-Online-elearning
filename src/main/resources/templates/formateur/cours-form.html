<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${cours != null ? 'Modifier ' + cours.titre : 'Nouveau Cours'} + ' | E-Learning'">Cours Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1 th:text="${cours != null ? 'Modifier le cours' : 'Nouveau Cours'}">Cours</h1></div>
        <div class="content-body fade-in">
            <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>
            <div class="card" style="max-width:700px;">
                <div class="card-body">
                    <form th:action="${cours != null ? '/formateur/cours/' + cours.id + '/edit' : '/formateur/cours'}" method="post" enctype="multipart/form-data">
                        <div class="form-group">
                            <label class="form-label">Titre du cours</label>
                            <input type="text" name="titre" class="form-control" th:value="${cours?.titre}" placeholder="Ex: Introduction à Java" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Décrivez votre cours..." required th:text="${cours?.description}"></textarea>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                            <div class="form-group">
                                <label class="form-label">Catégorie</label>
                                <input type="text" name="categorie" class="form-control" th:value="${cours?.categorie}" placeholder="Ex: Programmation" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Niveau</label>
                                <select name="niveau" class="form-control" required>
                                    <option th:each="n : ${niveaux}" th:value="${n}" th:text="${n}" th:selected="${cours != null && cours.niveau == n}">Niveau</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Image du cours</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                            <div th:if="${cours?.imageUrl}" style="margin-top:8px;"><img th:src="${cours.imageUrl}" style="max-height:100px; border-radius:8px;" alt="Image actuelle"></div>
                        </div>
                        <div style="display:flex; gap:12px; margin-top:24px;">
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> <span th:text="${cours != null ? 'Mettre à jour' : 'Créer le cours'}">Enregistrer</span></button>
                            <a th:href="@{/formateur/cours}" class="btn btn-outline">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
