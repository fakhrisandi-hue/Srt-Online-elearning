<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modules | E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1 th:text="'Modules : ' + ${cours.titre}">Modules</h1><p><a th:href="@{/formateur/cours}" style="color:var(--text-muted);"><i class="fas fa-arrow-left"></i> Retour aux cours</a></p></div>
        <div class="content-body fade-in">
            <div th:if="${message}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${message}"></span></div>
            <div th:if="${error}" class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span></div>

            <!-- Add Module Form -->
            <div class="card" style="margin-bottom:24px;">
                <div class="card-header"><h3><i class="fas fa-plus-circle"></i> Ajouter un module</h3></div>
                <div class="card-body">
                    <form th:action="@{/formateur/cours/{id}/modules(id=${cours.id})}" method="post" style="display:flex; gap:12px; align-items:end; flex-wrap:wrap;">
                        <div class="form-group" style="flex:2; margin-bottom:0;"><label class="form-label">Titre</label><input type="text" name="titre" class="form-control" required placeholder="Titre du module"></div>
                        <div class="form-group" style="flex:2; margin-bottom:0;"><label class="form-label">Description</label><input type="text" name="description" class="form-control" placeholder="Description (optionnel)"></div>
                        <div class="form-group" style="flex:0.5; margin-bottom:0;"><label class="form-label">Ordre</label><input type="number" name="ordre" class="form-control" required value="1" min="1"></div>
                        <button type="submit" class="btn btn-primary" style="height:42px;"><i class="fas fa-plus"></i> Ajouter</button>
                    </form>
                </div>
            </div>

            <!-- Modules List -->
            <div th:each="data : ${modulesData}" class="module-item" style="margin-bottom:20px;">
                <div class="module-header">
                    <div><strong th:text="'Module ' + ${data.module.ordre} + ' : ' + ${data.module.titre}">Module</strong>
                        <span style="color:var(--text-muted); font-size:13px; margin-left:8px;" th:text="${data.module.description}">Desc</span></div>
                    <div style="display:flex; gap:8px;">
                        <span class="badge badge-primary" th:text="${#lists.size(data.lecons)} + ' leçons'">0</span>
                        <span class="badge badge-cyan" th:text="${#lists.size(data.quizzes)} + ' quiz'">0</span>
                    </div>
                </div>
                <div class="module-content">
                    <!-- Lecons -->
                    <div th:each="lecon : ${data.lecons}" class="lecon-item">
                        <i class="fas fa-file-alt" style="color:var(--primary-light);"></i>
                        <span th:text="${lecon.titre}">Leçon</span>
                        <span class="badge badge-primary" style="margin-left:auto;" th:text="${lecon.dureeMin} + ' min'">10min</span>
                    </div>
                    <div th:each="quiz : ${data.quizzes}" class="quiz-item">
                        <i class="fas fa-question-circle" style="color:var(--accent);"></i>
                        <span th:text="${quiz.titre}">Quiz</span>
                        <span class="badge badge-cyan" style="margin-left:auto;" th:text="${quiz.dureeMin} + ' min'">15min</span>
                    </div>
                    <!-- Add Lecon Form -->
                    <details style="margin-top:12px;">
                        <summary style="cursor:pointer; color:var(--primary-light); font-size:13px; font-weight:600;"><i class="fas fa-plus"></i> Ajouter une leçon</summary>
                        <form th:action="@{/formateur/modules/{id}/lecons(id=${data.module.id})}" method="post" style="margin-top:12px; padding:16px; background:var(--bg-dark); border-radius:8px;">
                            <input type="hidden" name="coursId" th:value="${cours.id}">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                                <div class="form-group" style="margin-bottom:8px;"><label class="form-label">Titre</label><input type="text" name="titre" class="form-control" required></div>
                                <div style="display:flex; gap:12px;">
                                    <div class="form-group" style="margin-bottom:8px; flex:1;"><label class="form-label">Ordre</label><input type="number" name="ordre" class="form-control" required value="1" min="1"></div>
                                    <div class="form-group" style="margin-bottom:8px; flex:1;"><label class="form-label">Durée (min)</label><input type="number" name="dureeMin" class="form-control" required value="10" min="1"></div>
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom:8px;"><label class="form-label">Contenu</label><textarea name="contenu" class="form-control" rows="3" required placeholder="Contenu de la leçon..."></textarea></div>
                            <button type="submit" class="btn btn-sm btn-success"><i class="fas fa-save"></i> Enregistrer</button>
                        </form>
                    </details>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(modulesData)}" class="empty-state"><div class="icon"><i class="fas fa-cubes"></i></div><h3>Aucun module</h3><p>Ajoutez un module pour commencer</p></div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
