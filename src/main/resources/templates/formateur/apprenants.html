<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apprenants | E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1 th:text="'Apprenants : ' + ${cours.titre}">Apprenants</h1><p><a th:href="@{/formateur/cours}" style="color:var(--text-muted);"><i class="fas fa-arrow-left"></i> Retour</a></p></div>
        <div class="content-body fade-in">
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-users"></i> Apprenants inscrits</h3><span class="badge badge-primary" th:text="${#lists.size(apprenantsData)} + ' inscrits'">0</span></div>
                <div class="card-body">
                    <div class="table-container"><table>
                        <thead><tr><th>Nom</th><th>Email</th><th>Statut</th><th>Progression</th><th>Date d'inscription</th></tr></thead>
                        <tbody>
                        <tr th:each="data : ${apprenantsData}">
                            <td th:text="${data.apprenant.name}">Nom</td>
                            <td th:text="${data.apprenant.email}">email</td>
                            <td><span class="badge" th:classappend="${data.inscription.statut.name() == 'EN_COURS' ? 'badge-warning' : (data.inscription.statut.name() == 'TERMINE' ? 'badge-success' : 'badge-danger')}" th:text="${data.inscription.statut}">Statut</span></td>
                            <td>
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <div class="progress-bar-container" style="width:100px;"><div class="progress-bar-fill" th:style="'width:' + ${data.progression} + '%'"></div></div>
                                    <span style="font-size:13px; font-weight:600;" th:text="${#numbers.formatDecimal(data.progression, 0, 0)} + '%'">0%</span>
                                </div>
                            </td>
                            <td th:text="${#temporals.format(data.inscription.dateInscription, 'dd/MM/yyyy')}">Date</td>
                        </tr>
                        </tbody>
                    </table></div>
                    <div th:if="${#lists.isEmpty(apprenantsData)}" class="empty-state"><div class="icon"><i class="fas fa-users"></i></div><h3>Aucun apprenant inscrit</h3></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
