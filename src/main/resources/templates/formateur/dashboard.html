<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Formateur | E-Learning</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <main class="main-content">
        <div class="content-header"><h1>Bienvenue, <span th:text="${formateur.name}">Formateur</span></h1><p>Votre espace formateur</p></div>
        <div class="content-body fade-in">
            <div th:if="${message}" class="alert alert-success"><i class="fas fa-check-circle"></i> <span th:text="${message}"></span></div>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-book"></i></div><div class="stat-value" th:text="${totalCours}">0</div><div class="stat-label">Mes Cours</div></div>
                <div class="stat-card"><div class="stat-icon green"><i class="fas fa-user-graduate"></i></div><div class="stat-value" th:text="${totalApprenants}">0</div><div class="stat-label">Apprenants inscrits</div></div>
            </div>
            <div class="card">
                <div class="card-header"><h3><i class="fas fa-book-open"></i> Mes cours</h3><a th:href="@{/formateur/cours/new}" class="btn btn-sm btn-primary"><i class="fas fa-plus"></i> Nouveau cours</a></div>
                <div class="card-body">
                    <div th:if="${mesCours.isEmpty()}" class="empty-state"><div class="icon"><i class="fas fa-plus-circle"></i></div><h3>Créez votre premier cours</h3><p>Commencez par créer un cours pour vos apprenants</p><a th:href="@{/formateur/cours/new}" class="btn btn-primary" style="margin-top:16px;">Créer un cours</a></div>
                    <div class="courses-grid" th:unless="${mesCours.isEmpty()}">
                        <div class="card course-card" th:each="cours : ${mesCours}">
                            <div class="course-card-img">
                                <img th:if="${cours.imageUrl}" th:src="${cours.imageUrl}" alt="Cours">
                                <i th:unless="${cours.imageUrl}" class="fas fa-book"></i>
                            </div>
                            <div class="course-card-body">
                                <div class="course-card-title" th:text="${cours.titre}">Titre</div>
                                <div class="course-card-desc" th:text="${cours.description}">Description</div>
                                <div class="course-card-meta"><span class="badge badge-cyan" th:text="${cours.niveau}">Niveau</span><span th:text="${cours.categorie}">Catégorie</span></div>
                                <div style="margin-top:16px; display:flex; gap:8px;">
                                    <a th:href="@{/formateur/cours/{id}/edit(id=${cours.id})}" class="btn btn-sm btn-outline"><i class="fas fa-edit"></i> Modifier</a>
                                    <a th:href="@{/formateur/cours/{id}/modules(id=${cours.id})}" class="btn btn-sm btn-primary"><i class="fas fa-cubes"></i> Modules</a>
                                    <a th:href="@{/formateur/cours/{id}/apprenants(id=${cours.id})}" class="btn btn-sm btn-outline"><i class="fas fa-users"></i> Apprenants</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
